name: buildfork

on:
  push:
    branches:
      - main

jobs:
  deploy:
   runs-on: ubuntu-latest
   needs: build
   environment:
     name: production
     url: http://momentous-lizards.surge.sh
   steps:
    - name: Download the Build Artifact
      uses: actions/download-artifact@v7.0.0
      with:
       name: build
    - name: deploy to surge
      run: npx surge --project '.' --domain http://momentous-lizards.surge.sh
      env:
       SURGE_LOGIN: ${{ secrets.SURGE_LOGIN }}
       SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}
 
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - name: cache
        uses: actions/cache@v5.0.3
        with:
          path: ~/.npm
          key: buildCache
      - run: npm ci
      - run: npm test -- --coverage
        env:
          CI: true
      - name: upload code coverage
        uses: actions/upload-artifact@v7.0.0
        with:
          name: codecoverage
          path: coverage
      - name: build
        run: npm run build
      - name: upload build files
        uses: actions/upload-artifact@v7.0.0
        with:
          name: build
          path: build
      
